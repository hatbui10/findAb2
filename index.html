<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân tích số liệu - Bộ nhớ thông minh</title>
    <style>
        :root {
            --body-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --input-bg: #262626;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --primary: #007bff;
            --gold: #ffd700;
            --green: #4caf50;
            --danger: #dc3545;
            --cell-size: 34px;
            --gap: 4px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 850px; }

        .sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--body-bg); padding: 10px 0;
            overflow-x: auto; scrollbar-width: none;
        }
        .sticky-header::-webkit-scrollbar { display: none; }

        .controls {
            background: var(--card-bg); border-radius: 12px;
            padding: 15px; margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .row { display: flex; gap: 10px; flex-wrap: wrap; }
        .control-group { flex: 1; min-width: 140px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }

        input {
            background: var(--input-bg); border: 1px solid #333;
            border-radius: 8px; padding: 10px; color: white;
            font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--primary); }

        .btn-group { display: flex; gap: 8px; width: 100%; }
        .main-btn {
            flex: 1; border: none; padding: 12px; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 12px;
        }
        .btn-apply { background: var(--primary); color: white; }
        .btn-reset { background: var(--danger); color: white; flex: 0 0 100px; }
        .btn-high { background: var(--gold); color: black; }
        .btn-low { background: var(--green); color: white; }
        .main-btn:active { transform: scale(0.96); }

        .info-bar {
            background: rgba(255,255,255,0.05); padding: 12px;
            border-radius: 8px; text-align: center; font-size: 13px;
            margin-bottom: 15px; border: 1px solid #333;
        }

        #result-container {
            width: 100%; overflow-x: auto; background: #000;
            border-radius: 8px; padding: 10px; box-sizing: border-box;
        }

        .sync-grid { display: grid; gap: var(--gap); width: max-content; }

        .number-box, .index-box {
            width: var(--cell-size); height: var(--cell-size);
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; border-radius: 6px; font-size: 15px;
        }

        .index-box { color: white; font-size: 11px; }
        .idx-0 { background: #ff4b1f; } .idx-1 { background: #1291ff; } 
        .idx-2 { background: #ff00cc; } .idx-3 { background: #00f260; }
        .idx-4 { background: #f5af19; } .idx-5 { background: #8e2de2; }
        .idx-6 { background: #b91d73; } .idx-7 { background: #11998e; }
        .idx-8 { background: #eb3349; } .idx-9 { background: #4568dc; }

        .number-box { background: #222; color: #777; transition: 0.3s; }
        .high { background-color: var(--gold) !important; color: #000 !important; box-shadow: 0 0 12px var(--gold); }
        .low { background-color: var(--green) !important; color: #fff !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header" id="headerWrapper">
        <div id="header-grid" class="sync-grid"></div>
    </div>

    <div class="controls">
        <div class="row">
            <div class="control-group">
                <label>File dữ liệu (.txt)</label>
                <input type="file" id="fileInput" accept=".txt">
            </div>
            <div class="control-group">
                <label>Độ dài dòng (x)</label>
                <input type="number" id="rowLength" value="10" min="1">
            </div>
        </div>

        <div class="control-group">
            <label>Chuỗi quy tắc T1 (A: >=5, B: <5)</label>
            <div class="btn-group">
                <input type="text" id="t1Input" style="flex: 1;" placeholder="VD: AAAb">
                <button class="main-btn btn-apply" onclick="applyT1()">ÁP DỤNG</button>
                <button class="main-btn btn-reset" onclick="clearMemory()">RESET CACHE</button>
            </div>
        </div>

        <div class="btn-group">
            <button class="main-btn btn-high" onclick="processData('high')">TÔ VÀNG (DÃY 5 NGƯỢC)</button>
            <button class="main-btn btn-low" onclick="processData('low')">TÔ XANH (<5)</button>
        </div>
    </div>

    <div class="info-bar">
        Quy tắc: <span id="current-t1-display" style="color: #00d4ff; font-weight: bold;">--</span> | 
        Tổng số: <span id="total-count" style="color: var(--gold);">0</span>
    </div>

    <div id="result-container">
        <div id="result-grid" class="sync-grid"></div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const rowLengthInput = document.getElementById('rowLength');
    const t1Input = document.getElementById('t1Input');
    const currentT1Display = document.getElementById('current-t1-display');
    const headerGrid = document.getElementById('header-grid');
    const resultGrid = document.getElementById('result-grid');
    const resultContainer = document.getElementById('result-container');
    const headerWrapper = document.getElementById('headerWrapper');
    const totalCountSpan = document.getElementById('total-count');

    let currentNumbers = []; 

    resultContainer.addEventListener('scroll', () => {
        headerWrapper.scrollLeft = resultContainer.scrollLeft;
    });

    window.onload = function() {
        // Khôi phục từ LocalStorage
        rowLengthInput.value = localStorage.getItem('userRowLength') || 10;
        const savedT1 = localStorage.getItem('userT1') || 'AAAb';
        t1Input.value = savedT1;
        currentT1Display.textContent = savedT1;
        
        const savedData = localStorage.getItem('userCurrentNumbers');
        if (savedData) {
            currentNumbers = JSON.parse(savedData);
            totalCountSpan.textContent = currentNumbers.length;
            refreshAll();
        }
        updateHeaderGrid();
    };

    function clearMemory() {
        if(confirm("Xóa toàn bộ thiết lập và dữ liệu đã lưu?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function refreshAll() {
        const x = parseInt(rowLengthInput.value) || 10;
        const mode = localStorage.getItem('userLastMode') || '';
        updateHeaderGrid();
        renderGrid(currentNumbers, x, mode);
    }

    function applyT1() {
        const val = t1Input.value.trim();
        if(!val) return alert("Vui lòng nhập T1!");
        localStorage.setItem('userT1', val);
        currentT1Display.textContent = val;
        localStorage.setItem('userLastMode', 'high');
        refreshAll();
    }

    fileInput.addEventListener('change', function() {
        if (!this.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            currentNumbers = e.target.result.replace(/\\/g, ' ').trim().split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
            localStorage.setItem('userCurrentNumbers', JSON.stringify(currentNumbers));
            totalCountSpan.textContent = currentNumbers.length;
            refreshAll();
        };
        reader.readAsText(this.files[0]);
    });

    rowLengthInput.addEventListener('input', () => {
        localStorage.setItem('userRowLength', rowLengthInput.value);
        refreshAll();
    });

    function updateHeaderGrid() {
        const x = parseInt(rowLengthInput.value) || 10;
        headerGrid.style.gridTemplateColumns = `repeat(${x}, var(--cell-size))`;
        headerGrid.innerHTML = '';
        for (let i = 0; i < x; i++) {
            const box = document.createElement('div');
            box.className = `index-box idx-${i % 10}`;
            box.textContent = i % 10;
            headerGrid.appendChild(box);
        }
    }

    function processData(mode) {
        if (currentNumbers.length === 0) return alert("Chưa có dữ liệu!");
        localStorage.setItem('userLastMode', mode);
        refreshAll();
    }

    function renderGrid(data, columns, mode) {
        resultGrid.innerHTML = ''; 
        if (data.length === 0) return;
        resultGrid.style.gridTemplateColumns = `repeat(${columns}, var(--cell-size))`;
        
        const T1 = t1Input.value.trim() || 'AAAb';
        const t1Len = T1.length;
        const highlightYellow = new Array(data.length).fill(false);

        if (mode === 'high') {
            const violationMap = data.map((num, i) => {
                const char = T1[i % t1Len].toUpperCase();
                if (char === 'A') return num < 5;
                if (char === 'B') return num >= 5;
                return false;
            });

            for (let i = 0; i <= data.length - 5; i++) {
                if (violationMap[i] && violationMap[i+1] && violationMap[i+2] && violationMap[i+3] && violationMap[i+4]) {
                    for (let j = 0; j < 5; j++) highlightYellow[i + j] = true;
                }
            }
        }

        const fragment = document.createDocumentFragment();
        data.forEach((num, index) => {
            const box = document.createElement('div');
            box.className = 'number-box';
            box.textContent = num;
            if (mode === 'high' && highlightYellow[index]) box.classList.add('high');
            else if (mode === 'low' && num < 5) box.classList.add('low');
            fragment.appendChild(box);
        });
        resultGrid.appendChild(fragment);
    }
</script>

</body>
</html>

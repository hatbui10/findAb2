<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Lọc & Sắp Xếp Mn</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 10px;
        }

        .container { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

        .config-bar {
            background: #1e1e1e; padding: 15px;
            border-radius: 8px; border: 1px solid #333;
            display: flex; align-items: center; gap: 15px; flex-wrap: wrap;
        }

        #inputText { display: none; }

        .output-grid { 
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 15px;
            height: calc(100vh - 220px); 
            overflow-y: auto;
            background-color: #181818;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .column { display: flex; flex-direction: column; gap: 5px; }

        .result-item {
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            padding: 6px 10px;
            border-bottom: 1px solid #252525;
            white-space: nowrap;
        }

        .controls { display: flex; gap: 8px; flex-wrap: wrap; }

        button, .file-label { 
            padding: 10px 15px; cursor: pointer; border: none; 
            border-radius: 6px; font-weight: bold; font-size: 13px;
        }
        
        .btn-Ab { background: #ffff00; color: #000; }
        .btn-bA { background: #00bfff; color: #000; }
        .btn-clear { background: #444; color: #fff; }
        .btn-file { background: #3700b3; color: #fff; }

        .pattern-part { font-weight: bold; }
        .mn-part { color: #ff00ff; font-weight: bold; margin-left: 5px; border: 1px solid #444; padding: 0 2px; }
        .suffix-part { color: #888; }
        .suffix-highlight { color: #00f2ff !important; font-weight: bold; text-shadow: 0 0 5px #00bfff; }
        
        input[type="number"] {
            padding: 5px; width: 50px; border-radius: 4px; border: 1px solid #444; 
            background: #2c2c2c; color: #fff; text-align: center;
        }
        
        #status-info { color: #03dac6; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="config-bar">
        <div style="display: flex; align-items: center; gap: 8px;">
            <label>Độ dài Pattern:</label>
            <input type="number" id="patternLen" value="4" min="2" oninput="saveConfig()">
        </div>
        
        <div class="controls">
            <button class="btn-Ab" onclick="processData('Ab')">LỌC & SẮP XẾP AbAb...</button>
            <button class="btn-bA" onclick="processData('bA')">LỌC & SẮP XẾP bAbA...</button>
            <span id="status-info"></span>
        </div>

        <div style="margin-left: auto; display: flex; gap: 8px;">
            <label class="file-label btn-file">📁 FILE <input type="file" id="fileInput" accept=".txt" style="display:none"></label>
            <button class="btn-clear" onclick="clearAll()">🗑️ XÓA</button>
        </div>
    </div>

    <div id="outputGrid" class="output-grid">
        <div class="column" id="col1"></div>
        <div class="column" id="col2"></div>
        <div class="column" id="col3"></div>
    </div>
    
    <textarea id="inputText"></textarea>
</div>

<script>
    const inputEl = document.getElementById('inputText');
    const cols = [document.getElementById('col1'), document.getElementById('col2'), document.getElementById('col3')];
    const patternLenEl = document.getElementById('patternLen');
    const statusInfo = document.getElementById('status-info');

    const isA = (c) => /[0-9]/.test(c) && parseInt(c) >= 5;

    function isHomogeneous(str) {
        if (!str) return false;
        let firstIsA = isA(str[0]);
        for (let i = 1; i < str.length; i++) {
            if (isA(str[i]) !== firstIsA) return false;
        }
        return true;
    }

    function saveConfig() {
        localStorage.setItem('tool_pattern_len_v5', patternLenEl.value);
    }

    function processData(mode) {
        const text = inputEl.value.replace(/[^0-9]/g, '');
        const pLen = parseInt(patternLenEl.value) || 4;
        const mnLen = 2; 
        const sLen = 9;  
        let dataObjects = []; // Chứa các đối tượng để sắp xếp

        localStorage.setItem('tool_last_mode_v5', mode);
        cols.forEach(c => c.innerHTML = "");

        for (let i = 0; i <= text.length - (pLen + mnLen + sLen); i++) {
            let patternPart = text.substring(i, i + pLen);
            let mnPart = text.substring(i + pLen, i + pLen + mnLen);
            let suffixPart = text.substring(i + pLen + mnLen, i + pLen + mnLen + sLen);
            
            let isValid = true;
            if (mode === 'Ab' && !isA(patternPart[0])) isValid = false;
            if (mode === 'bA' && isA(patternPart[0])) isValid = false;

            if (isValid) {
                for (let k = 0; k < patternPart.length - 1; k++) {
                    if (isA(patternPart[k]) === isA(patternPart[k+1])) {
                        isValid = false;
                        break;
                    }
                }
            }

            if (isValid) {
                dataObjects.push({
                    pattern: patternPart,
                    mn: mnPart,
                    suffix: suffixPart,
                    mnValue: parseInt(mnPart) // Chuyển Mn thành số để so sánh
                });
            }
        }

        // --- BƯỚC SẮP XẾP: Mn từ bé đến lớn ---
        dataObjects.sort((a, b) => a.mnValue - b.mnValue);

        // Chuyển đối tượng thành HTML
        let finalHTMLs = dataObjects.map(obj => {
            let pColor = mode === 'Ab' ? '#ffff00' : '#00bfff';
            let suffixClass = isHomogeneous(obj.suffix) ? 'suffix-part suffix-highlight' : 'suffix-part';
            
            return `<div class="result-item">
                <span class="pattern-part" style="color:${pColor}">${obj.pattern}</span>
                <span class="mn-part">${obj.mn}</span>
                <span style="color:#666"> - </span>
                <span class="${suffixClass}">${obj.suffix}</span>
            </div>`;
        });

        // Chia vào 3 cột
        finalHTMLs.forEach((html, index) => {
            cols[index % 3].innerHTML += html;
        });

        statusInfo.innerText = `Tìm thấy & Sắp xếp: ${finalHTMLs.length}`;
    }

    function clearAll() {
        if(confirm("Xóa sạch kết quả và dữ liệu lưu trữ?")) {
            inputEl.value = "";
            cols.forEach(c => c.innerHTML = "");
            statusInfo.innerText = "";
            localStorage.clear();
        }
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (f) {
            const r = new FileReader();
            r.onload = (ev) => { 
                inputEl.value = ev.target.result; 
                localStorage.setItem('tool_raw_data_v5', inputEl.value);
                statusInfo.innerText = "Đã nạp file!";
            };
            r.readAsText(f);
        }
    });

    window.onload = () => {
        const savedData = localStorage.getItem('tool_raw_data_v5');
        const savedLen = localStorage.getItem('tool_pattern_len_v5');
        const lastMode = localStorage.getItem('tool_last_mode_v5');

        if (savedData) inputEl.value = savedData;
        if (savedLen) patternLenEl.value = savedLen;
        if (savedData && lastMode) processData(lastMode);
    };
</script>
</body>
</html>

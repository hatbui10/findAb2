<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân tích số liệu Pro - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --body-bg: #0a0a0c;
            --card-bg: #16161e;
            --input-bg: #1f1f29;
            --text-main: #e1e1e6;
            --text-dim: #9494b8;
            --primary: #3d5afe;
            --primary-hover: #536dfe;
            --gold: #ffcc00; /* Màu cho số lớn */
            --green: #00e676; /* Màu cho số nhỏ */
            --danger: #ff5252;
            --cell-size: 38px;
            --gap: 6px;
            --radius: 10px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 1000px; animation: fadeIn 0.5s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid #2d2d3d;
            overflow-x: auto; scrollbar-width: none;
        }
        .sticky-header::-webkit-scrollbar { display: none; }

        .controls {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #2d2d3d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .row { display: flex; gap: 15px; flex-wrap: wrap; }
        .control-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 8px; }
        
        label { 
            font-size: 11px; 
            color: var(--text-dim); 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            padding-left: 4px;
        }

        input {
            background: var(--input-bg);
            border: 2px solid #2d2d3d;
            border-radius: var(--radius);
            padding: 12px 15px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(61, 90, 254, 0.2); }

        .btn-group { display: flex; gap: 10px; width: 100%; }
        .main-btn {
            flex: 1; border: none; padding: 14px; border-radius: var(--radius);
            font-weight: 800; cursor: pointer; transition: all 0.2s;
            font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
        }
        .btn-apply { background: var(--primary); color: white; }
        .btn-apply:hover { background: var(--primary-hover); transform: translateY(-2px); }
        
        .btn-reset { background: transparent; color: var(--danger); border: 2px solid var(--danger); flex: 0 0 130px; }
        .btn-reset:hover { background: var(--danger); color: white; }

        .btn-high { background: var(--gold); color: #1a1a1a; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }
        .btn-high:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .btn-low { background: var(--green); color: #1a1a1a; box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3); }
        .btn-low:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .main-btn:active { transform: scale(0.95); }

        .info-bar {
            background: #1e1e2e;
            padding: 15px;
            border-radius: var(--radius);
            text-align: center;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            font-weight: 600;
        }

        #result-container {
            width: 100%;
            background: #0d0d12;
            border-radius: var(--radius);
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid #2d2d3d;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            min-height: 400px;
        }

        .sync-grid { display: grid; gap: var(--gap); width: max-content; margin: 0 auto; }

        .number-box, .index-box {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s ease;
        }

        .index-box { color: white; font-size: 12px; }
        .idx-0 { background: #ff4b1f; } .idx-1 { background: #0052D4; } 
        .idx-2 { background: #8E2DE2; } .idx-3 { background: #11998e; }
        .idx-4 { background: #f09819; } .idx-5 { background: #4568dc; }
        .idx-6 { background: #D4145A; } .idx-7 { background: #009245; }
        .idx-8 { background: #662D8C; } .idx-9 { background: #2E3192; }

        .number-box { 
            background: #1f1f2e; 
            color: #5d5d7a; 
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 16px;
        }

        .high { 
            background: var(--gold) !important; 
            color: #000 !important; 
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); 
            border: none !important;
        }
        .low { 
            background: var(--green) !important; 
            color: #000 !important; 
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
            border: none !important;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #2d2d3d; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header" id="headerWrapper">
        <div id="header-grid" class="sync-grid"></div>
    </div>

    <div class="controls">
        <div class="row">
            <div class="control-group">
                <label>Dữ liệu nguồn (.txt)</label>
                <input type="file" id="fileInput" accept=".txt">
            </div>
            <div class="control-group">
                <label>Độ rộng bảng (X cột)</label>
                <input type="number" id="rowLength" value="10" min="1">
            </div>
        </div>

        <div class="control-group">
            <label>Quy tắc T1 (A: ≥5, B: <5)</label>
            <div class="btn-group">
                <input type="text" id="t1Input" style="flex: 1;" placeholder="Ví dụ: AAAbbb">
                <button class="main-btn btn-apply" onclick="applyT1()">Áp dụng quy tắc</button>
                <button class="main-btn btn-reset" onclick="clearMemory()">Dọn Cache</button>
            </div>
        </div>

        <div class="btn-group">
            <button class="main-btn btn-high" onclick="processData('high')">Lọc số lớn (≥ 5)</button>
            <button class="main-btn btn-low" onclick="processData('low')">Lọc số nhỏ (< 5)</button>
        </div>
    </div>

    <div class="info-bar">
        Cấu hình: <span id="current-t1-display" style="color: var(--primary); font-family: 'JetBrains Mono';">--</span> 
        &nbsp;|&nbsp; 
        Dữ liệu: <span id="total-count" style="color: var(--green);">0</span> số
    </div>

    <div id="result-container">
        <div id="result-grid" class="sync-grid"></div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const rowLengthInput = document.getElementById('rowLength');
    const t1Input = document.getElementById('t1Input');
    const currentT1Display = document.getElementById('current-t1-display');
    const headerGrid = document.getElementById('header-grid');
    const resultGrid = document.getElementById('result-grid');
    const resultContainer = document.getElementById('result-container');
    const headerWrapper = document.getElementById('headerWrapper');
    const totalCountSpan = document.getElementById('total-count');

    let currentNumbers = []; 

    resultContainer.addEventListener('scroll', () => {
        headerWrapper.scrollLeft = resultContainer.scrollLeft;
    });

    window.onload = function() {
        rowLengthInput.value = localStorage.getItem('userRowLength') || 10;
        const savedT1 = localStorage.getItem('userT1') || 'AAAb';
        t1Input.value = savedT1;
        currentT1Display.textContent = savedT1;
        
        const savedData = localStorage.getItem('userCurrentNumbers');
        if (savedData) {
            currentNumbers = JSON.parse(savedData);
            totalCountSpan.textContent = currentNumbers.length;
            refreshAll();
        }
        updateHeaderGrid();
    };

    function clearMemory() {
        if(confirm("Xóa toàn bộ thiết lập và dữ liệu đã lưu?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function refreshAll() {
        const x = parseInt(rowLengthInput.value) || 10;
        const mode = localStorage.getItem('userLastMode') || '';
        updateHeaderGrid();
        renderGrid(currentNumbers, x, mode);
    }

    function applyT1() {
        const val = t1Input.value.trim();
        if(!val) return alert("Vui lòng nhập T1!");
        localStorage.setItem('userT1', val);
        currentT1Display.textContent = val;
        localStorage.setItem('userLastMode', 'high');
        refreshAll();
    }

    fileInput.addEventListener('change', function() {
        if (!this.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            // Đọc dữ liệu theo từng chữ số đơn lẻ
            const rawText = e.target.result.trim();
            const cleanText = rawText.replace(/[\s\r\n\\,]+/g, '');
            currentNumbers = cleanText.split('').map(Number).filter(n => !isNaN(n));

            localStorage.setItem('userCurrentNumbers', JSON.stringify(currentNumbers));
            totalCountSpan.textContent = currentNumbers.length;
            refreshAll();
        };
        reader.readAsText(this.files[0]);
    });

    rowLengthInput.addEventListener('input', () => {
        localStorage.setItem('userRowLength', rowLengthInput.value);
        refreshAll();
    });

    function updateHeaderGrid() {
        const x = parseInt(rowLengthInput.value) || 10;
        headerGrid.style.gridTemplateColumns = `repeat(${x}, var(--cell-size))`;
        headerGrid.innerHTML = '';
        for (let i = 0; i < x; i++) {
            const box = document.createElement('div');
            box.className = `index-box idx-${i % 10}`;
            box.textContent = i % 10;
            headerGrid.appendChild(box);
        }
    }

    function processData(mode) {
        if (currentNumbers.length === 0) return alert("Chưa có dữ liệu!");
        localStorage.setItem('userLastMode', mode);
        refreshAll();
    }

    function renderGrid(data, columns, mode) {
        resultGrid.innerHTML = ''; 
        if (data.length === 0) return;
        resultGrid.style.gridTemplateColumns = `repeat(${columns}, var(--cell-size))`;
        
        const fragment = document.createDocumentFragment();
        data.forEach((num) => {
            const box = document.createElement('div');
            box.className = 'number-box';
            box.textContent = num;
            
            // Logic tô màu đơn giản: 
            // Nếu bấm nút Lớn (high) -> tô vàng số >= 5
            // Nếu bấm nút Nhỏ (low) -> tô xanh số < 5
            if (mode === 'high' && num >= 5) {
                box.classList.add('high');
            } else if (mode === 'low' && num < 5) {
                box.classList.add('low');
            }
            
            fragment.appendChild(box);
        });
        resultGrid.appendChild(fragment);
    }
</script>

</body>
</html>

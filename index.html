<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân tích số liệu - Dark Mode</title>
    <style>
        :root {
            --primary: #007bff;
            --bg-high: #ffd700; /* Vàng đậm */
            --bg-low: #4caf50;  /* Xanh */
            --body-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --input-bg: #2d2d2d;
            --control-bg: #252525;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--body-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 95%;
        }

        h2 { color: var(--text-color); text-align: center; margin-bottom: 25px; }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: var(--control-bg);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; font-size: 14px; color: #aaa; }
        
        input { 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            outline: none;
            background: var(--input-bg);
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            grid-column: 1 / -1;
            margin-top: 10px;
        }

        button.main-btn {
            flex: 1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            height: 45px;
            transition: 0.2s;
        }

        .btn-high { background-color: #b8860b; }
        .btn-low { background-color: #2e7d32; }
        button:active { transform: scale(0.98); }

        #result-container {
            margin-top: 20px;
            overflow-x: auto;
            border-top: 2px solid var(--border-color);
            padding-top: 20px;
        }

        #result-grid {
            display: grid;
            gap: 4px;
            justify-content: start;
        }

        .number-box {
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 4px;
            font-size: 18px;
            background: #333;
            color: #fff;
            transition: 0.2s;
        }

        .high { background-color: var(--bg-high) !important; color: #000 !important; }
        .low { background-color: var(--bg-low) !important; color: #fff !important; }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Phân tích số liệu (30x30 - Font 18)</h2>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--bg-high);"></div> ≥ 5</div>
        <div class="legend-item"><div class="dot" style="background: var(--bg-low);"></div> < 5</div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="fileInput">Chọn File dữ liệu (.txt)</label>
            <input type="file" id="fileInput" accept=".txt">
        </div>
        <div class="control-group">
            <label for="rowLength">Độ dài mỗi dòng (x)</label>
            <input type="number" id="rowLength" value="10" min="1" autofocus>
        </div>
        
        <div class="btn-group">
            <button class="main-btn btn-high" onclick="processData('high')">TÔ VÀNG (≥ 5)</button>
            <button class="main-btn btn-low" onclick="processData('low')">TÔ XANH (< 5)</button>
        </div>
    </div>

    <div id="result-container">
        <div id="result-grid"></div>
    </div>
</div>

<script>
    const rowLengthInput = document.getElementById('rowLength');

    // 1. LocalStorage: Khi load trang, lấy giá trị đã lưu
    window.onload = function() {
        const savedLength = localStorage.getItem('userRowLength');
        if (savedLength) {
            rowLengthInput.value = savedLength;
        }
        rowLengthInput.focus();
    };

    // Lưu giá trị vào LocalStorage mỗi khi người dùng thay đổi số x
    rowLengthInput.addEventListener('input', function() {
        localStorage.setItem('userRowLength', rowLengthInput.value);
    });

    document.getElementById('rowLength').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            // Mặc định Enter sẽ chạy nút tô vàng
            processData('high');
        }
    });

    function processData(mode) {
        const fileInput = document.getElementById('fileInput');
        const x = parseInt(rowLengthInput.value);

        if (!fileInput.files[0]) {
            alert("Vui lòng tải file lên trước!");
            return;
        }
        if (isNaN(x) || x <= 0) {
            alert("Vui lòng nhập độ dài dòng hợp lệ!");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const rawText = e.target.result;
            // Xử lý regex cơ bản để lấy số
            const cleanText = rawText.replace(/\\/g, ' ');
            const numbers = cleanText.trim().split(/[\s,]+/).map(Number).filter(n => !isNaN(n));

            if (numbers.length === 0) {
                alert("Không tìm thấy số hợp lệ!");
                return;
            }
            renderGrid(numbers, x, mode);
        };
        reader.readAsText(fileInput.files[0]);
    }

    function renderGrid(data, columns, mode) {
        const grid = document.getElementById('result-grid');
        grid.innerHTML = ''; 
        grid.style.gridTemplateColumns = `repeat(${columns}, 30px)`;

        data.forEach(num => {
            const box = document.createElement('div');
            box.className = 'number-box';
            box.textContent = num;

            if (mode === 'high' && num >= 5) {
                box.classList.add('high');
            } else if (mode === 'low' && num < 5) {
                box.classList.add('low');
            }

            grid.appendChild(box);
        });
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân tích số liệu Pro - Mobile Ready</title>
    <style>
        :root {
            --primary: #007bff;
            --bg-high: #ffd700; 
            --bg-low: #4caf50;  
            --body-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --input-bg: #2d2d2d;
            --control-bg: #252525;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--body-bg);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 1000px;
            box-sizing: border-box;
        }

        h2 { font-size: 1.2rem; text-align: center; margin: 10px 0 20px; }

        /* Hộp nổi (Sticky Header) - Tối ưu cho Mobile */
        .sticky-header {
            position: sticky;
            top: 5px;
            z-index: 100;
            background: var(--control-bg);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #444;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .header-title {
            font-size: 10px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
            text-align: center;
        }

        .index-row {
            display: flex;
            justify-content: center;
            gap: 4px; /* Giảm khoảng cách trên mobile */
        }

        .index-box {
            width: 30px; /* Thu nhỏ một chút để vừa màn hình dọc */
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            color: white;
        }

        /* Màu lung linh */
        .idx-0 { background: linear-gradient(135deg, #ff4b1f, #ff9068); }
        .idx-1 { background: linear-gradient(135deg, #1fddff, #1291ff); }
        .idx-2 { background: linear-gradient(135deg, #ff00cc, #333399); }
        .idx-3 { background: linear-gradient(135deg, #00f260, #0575e6); }
        .idx-4 { background: linear-gradient(135deg, #f12711, #f5af19); }
        .idx-5 { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
        .idx-6 { background: linear-gradient(135deg, #f953c6, #b91d73); }
        .idx-7 { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .idx-8 { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .idx-9 { background: linear-gradient(135deg, #4568dc, #b06ab3); }

        /* Form điều khiển */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--control-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 13px; color: #aaa; }
        input { 
            padding: 10px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            background: var(--input-bg); 
            color: white; 
            font-size: 16px; /* Tránh iOS zoom khi click */
        }

        .btn-group { display: flex; gap: 8px; margin-top: 5px; }
        .main-btn { 
            flex: 1; 
            color: white; 
            border: none; 
            padding: 12px 5px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 13px;
        }
        .btn-high { background-color: #b8860b; }
        .btn-low { background-color: #2e7d32; }

        /* Vùng kết quả - Cực kỳ quan trọng trên Mobile */
        #result-container { 
            overflow-x: auto; /* Cho phép cuộn ngang nếu x quá lớn */
            width: 100%;
            background: #1a1a1a;
            padding: 10px 0;
            border-radius: 8px;
            -webkit-overflow-scrolling: touch; /* Cuộn mượt trên iPhone */
        }

        #result-grid { 
            display: grid; 
            gap: 4px; 
            margin: 0 auto;
            width: max-content; /* Đảm bảo grid không bị bóp méo */
        }

        .number-box {
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 4px;
            font-size: 18px;
            background: #333;
            color: #fff;
        }

        .high { background-color: var(--bg-high) !important; color: #000 !important; box-shadow: 0 0 5px var(--bg-high); }
        .low { background-color: var(--bg-low) !important; color: #fff !important; box-shadow: 0 0 5px var(--bg-low); }

        /* Tối ưu hóa thêm cho Desktop */
        @media (min-width: 600px) {
            .controls { flex-direction: row; align-items: flex-end; }
            h2 { font-size: 1.5rem; }
            .index-box { width: 35px; height: 35px; }
            .index-row { gap: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Phân tích số liệu Pro</h2>

    
        <div class="header-title">Thanh đối chiếu</div>
        <div class="index-row">
            <div class="index-box idx-0">0</div>
            <div class="index-box idx-1">1</div>
            <div class="index-box idx-2">2</div>
            <div class="index-box idx-3">3</div>
            <div class="index-box idx-4">4</div>
            <div class="index-box idx-5">5</div>
            <div class="index-box idx-6">6</div>
            <div class="index-box idx-7">7</div>
            <div class="index-box idx-8">8</div>
            <div class="index-box idx-9">9</div>
        </div>
    

    <div class="controls">
        <div class="control-group">
            <label>Chọn File (.txt)</label>
            <input type="file" id="fileInput" accept=".txt">
        </div>
        <div class="control-group">
            <label>Độ dài dòng (x)</label>
            <input type="number" id="rowLength" value="10" min="1">
        </div>
        <div class="btn-group">
            <button class="main-btn btn-high" onclick="processData('high')">TÔ VÀNG</button>
            <button class="main-btn btn-low" onclick="processData('low')">TÔ XANH</button>
        </div>
    </div>

    <div id="result-container">
        <div id="result-grid"></div>
    </div>
</div>

<script>
    const rowLengthInput = document.getElementById('rowLength');

    window.onload = function() {
        const savedLength = localStorage.getItem('userRowLength');
        if (savedLength) rowLengthInput.value = savedLength;
    };

    rowLengthInput.addEventListener('input', function() {
        localStorage.setItem('userRowLength', rowLengthInput.value);
    });

    function processData(mode) {
        const fileInput = document.getElementById('fileInput');
        const x = parseInt(rowLengthInput.value);

        if (!fileInput.files[0]) { alert("Vui lòng tải file!"); return; }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const rawText = e.target.result;
            const cleanText = rawText.replace(/\\/g, ' ').replace(/\\/gi, ' ');
            const numbers = cleanText.trim().split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
            renderGrid(numbers, x, mode);
        };
        reader.readAsText(fileInput.files[0]);
    }

    function renderGrid(data, columns, mode) {
        const grid = document.getElementById('result-grid');
        grid.innerHTML = ''; 
        grid.style.gridTemplateColumns = `repeat(${columns}, 30px)`;

        data.forEach(num => {
            const box = document.createElement('div');
            box.className = 'number-box';
            box.textContent = num;
            if (mode === 'high' && num >= 5) box.classList.add('high');
            else if (mode === 'low' && num < 5) box.classList.add('low');
            grid.appendChild(box);
        });
    }
</script>

</body>
</html>
